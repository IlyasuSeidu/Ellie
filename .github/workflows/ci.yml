name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    env:
      # Firebase configuration (dummy values for CI)
      FIREBASE_API_KEY: ci-test-api-key
      FIREBASE_AUTH_DOMAIN: ci-test.firebaseapp.com
      FIREBASE_PROJECT_ID: ci-test-project
      FIREBASE_STORAGE_BUCKET: ci-test.appspot.com
      FIREBASE_MESSAGING_SENDER_ID: '123456789'
      FIREBASE_APP_ID: 1:123456789:web:abcdef
      GOOGLE_WEB_CLIENT_ID: 123456789-abcdef.apps.googleusercontent.com
      ELLIE_BRAIN_URL: https://ellie-brain-test.cloudfunctions.net/ellieBrain
      ELLIE_BRAIN_TIMEOUT: '30000'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Upload lint results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-results
          path: |
            eslint-report.json
            tsc-output.txt

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    env:
      # Firebase configuration (dummy values for CI)
      FIREBASE_API_KEY: ci-test-api-key
      FIREBASE_AUTH_DOMAIN: ci-test.firebaseapp.com
      FIREBASE_PROJECT_ID: ci-test-project
      FIREBASE_STORAGE_BUCKET: ci-test.appspot.com
      FIREBASE_MESSAGING_SENDER_ID: '123456789'
      FIREBASE_APP_ID: 1:123456789:web:abcdef
      GOOGLE_WEB_CLIENT_ID: 123456789-abcdef.apps.googleusercontent.com
      ELLIE_BRAIN_URL: https://ellie-brain-test.cloudfunctions.net/ellieBrain
      ELLIE_BRAIN_TIMEOUT: '30000'
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Jest tests
        run: npm test -- --coverage --watchAll=false --runInBand --forceExit --silent

      - name: Check coverage thresholds
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const coverage = require('./coverage/coverage-summary.json');
              const total = coverage.total;
              const failed = [];

              if (total.branches.pct < 60) failed.push('Branches: ' + total.branches.pct + '%');
              if (total.functions.pct < 70) failed.push('Functions: ' + total.functions.pct + '%');
              if (total.lines.pct < 70) failed.push('Lines: ' + total.lines.pct + '%');
              if (total.statements.pct < 70) failed.push('Statements: ' + total.statements.pct + '%');

              if (failed.length > 0) {
                console.error('Coverage thresholds not met:');
                failed.forEach(f => console.error('  - ' + f));
                process.exit(1);
              } else {
                console.log('All coverage thresholds met (branches >= 60%, others >= 70%)');
              }
            "
          else
            echo "No coverage summary found, skipping threshold check"
          fi

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

      - name: Upload coverage to Codecov (optional)
        if: always()
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    env:
      # Firebase configuration (dummy values for CI)
      FIREBASE_API_KEY: ci-test-api-key
      FIREBASE_AUTH_DOMAIN: ci-test.firebaseapp.com
      FIREBASE_PROJECT_ID: ci-test-project
      FIREBASE_STORAGE_BUCKET: ci-test.appspot.com
      FIREBASE_MESSAGING_SENDER_ID: '123456789'
      FIREBASE_APP_ID: 1:123456789:web:abcdef
      GOOGLE_WEB_CLIENT_ID: 123456789-abcdef.apps.googleusercontent.com
      ELLIE_BRAIN_URL: https://ellie-brain-test.cloudfunctions.net/ellieBrain
      ELLIE_BRAIN_TIMEOUT: '30000'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check Expo configuration
        run: npx expo config --type public
        continue-on-error: true

      - name: Validate package.json
        run: npm run validate

      - name: Cache build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            node_modules
            .expo
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-
