name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    env:
      # Firebase configuration (dummy values for CI)
      FIREBASE_API_KEY: ci-test-api-key
      FIREBASE_AUTH_DOMAIN: ci-test.firebaseapp.com
      FIREBASE_PROJECT_ID: ci-test-project
      FIREBASE_STORAGE_BUCKET: ci-test.appspot.com
      FIREBASE_MESSAGING_SENDER_ID: '123456789'
      FIREBASE_APP_ID: 1:123456789:web:abcdef
      GOOGLE_WEB_CLIENT_ID: 123456789-abcdef.apps.googleusercontent.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Upload lint results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: |
            eslint-report.json
            tsc-output.txt

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    env:
      # Firebase configuration (dummy values for CI)
      FIREBASE_API_KEY: ci-test-api-key
      FIREBASE_AUTH_DOMAIN: ci-test.firebaseapp.com
      FIREBASE_PROJECT_ID: ci-test-project
      FIREBASE_STORAGE_BUCKET: ci-test.appspot.com
      FIREBASE_MESSAGING_SENDER_ID: '123456789'
      FIREBASE_APP_ID: 1:123456789:web:abcdef
      GOOGLE_WEB_CLIENT_ID: 123456789-abcdef.apps.googleusercontent.com
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Jest tests
        run: npm test -- --coverage --watchAll=false

      - name: Check coverage thresholds
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const coverage = require('./coverage/coverage-summary.json');
              const total = coverage.total;
              const failed = [];

              if (total.branches.pct < 70) failed.push('Branches: ' + total.branches.pct + '%');
              if (total.functions.pct < 70) failed.push('Functions: ' + total.functions.pct + '%');
              if (total.lines.pct < 70) failed.push('Lines: ' + total.lines.pct + '%');
              if (total.statements.pct < 70) failed.push('Statements: ' + total.statements.pct + '%');

              if (failed.length > 0) {
                console.error('Coverage thresholds not met:');
                failed.forEach(f => console.error('  - ' + f));
                process.exit(1);
              } else {
                console.log('All coverage thresholds met (>= 70%)');
              }
            "
          else
            echo "No coverage summary found, skipping threshold check"
          fi

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload coverage to Codecov (optional)
        if: always()
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    env:
      # Firebase configuration (dummy values for CI)
      FIREBASE_API_KEY: ci-test-api-key
      FIREBASE_AUTH_DOMAIN: ci-test.firebaseapp.com
      FIREBASE_PROJECT_ID: ci-test-project
      FIREBASE_STORAGE_BUCKET: ci-test.appspot.com
      FIREBASE_MESSAGING_SENDER_ID: '123456789'
      FIREBASE_APP_ID: 1:123456789:web:abcdef
      GOOGLE_WEB_CLIENT_ID: 123456789-abcdef.apps.googleusercontent.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check Expo configuration
        run: npx expo config --type public
        continue-on-error: true

      - name: Validate package.json
        run: npm run validate

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            .expo
          key: ${{ runner.os }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-
